name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_docker_integration:
        description: "Run Docker-dependent compose smoke checks"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  check:
    name: Local quality gate (make check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Validate Docker Compose syntax
        run: docker compose config

      - name: Run local quality gate
        run: make check

  docker-integration:
    name: Optional Docker integration smoke (manual)
    runs-on: ubuntu-latest
    needs: check
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_docker_integration == 'true' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Start Docker services
        run: make docker-up

      - name: Wait for Docker services
        run: make wait-services

      - name: Create Redpanda topics
        run: make create-topics

      - name: Generate sample data
        run: make generate-sample

      - name: Stop Docker services
        if: always()
        run: make docker-down
