<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">Data flow from synthetic event to dashboard</title>
  <desc id="desc">Flow diagram showing generation, publication, streaming validation, raw storage, analytical queries, and dashboard/API outputs.</desc>
  <style>
    .bg { fill: #082f49; }
    .step { fill: #0f172a; stroke: #7dd3fc; stroke-width: 2; rx: 12; }
    .warn { stroke: #fbbf24; }
    .text { fill: #f8fafc; font: 14px sans-serif; }
    .small { fill: #cbd5e1; font: 12px sans-serif; }
    .arrow { stroke: #a7f3d0; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#a7f3d0"/></marker></defs>
  <rect class="bg" width="1000" height="360" rx="18"/>
  <text class="text" x="34" y="34">Implemented data flow and partial quality path</text>
  <rect class="step" x="30" y="80" width="140" height="86"/><text class="text" x="54" y="112">Generate</text><text class="small" x="48" y="136">journeys + JSONL</text>
  <rect class="step" x="205" y="80" width="140" height="86"/><text class="text" x="236" y="112">Publish</text><text class="small" x="228" y="136">Redpanda topic</text>
  <rect class="step" x="380" y="80" width="155" height="86"/><text class="text" x="410" y="112">Parse/split</text><text class="small" x="400" y="136">valid vs invalid</text>
  <rect class="step" x="570" y="80" width="160" height="86"/><text class="text" x="600" y="112">Dedupe</text><text class="small" x="592" y="136">event-time watermark</text>
  <rect class="step" x="765" y="80" width="155" height="86"/><text class="text" x="800" y="112">Raw sink</text><text class="small" x="786" y="136">ClickHouse raw_events</text>
  <rect class="step warn" x="380" y="230" width="155" height="76"/><text class="text" x="408" y="262">DLQ envelope</text><text class="small" x="404" y="284">topic publish planned</text>
  <rect class="step warn" x="570" y="230" width="160" height="76"/><text class="text" x="600" y="262">Metric marts</text><text class="small" x="592" y="284">continuous writers planned</text>
  <rect class="step" x="765" y="230" width="155" height="76"/><text class="text" x="800" y="262">API + dashboard</text><text class="small" x="790" y="284">reviewer outputs</text>
  <path class="arrow" d="M170 123 H205"/><path class="arrow" d="M345 123 H380"/><path class="arrow" d="M535 123 H570"/><path class="arrow" d="M730 123 H765"/>
  <path class="arrow" d="M458 166 V230"/><path class="arrow" d="M650 166 V230"/><path class="arrow" d="M730 268 H765"/>
  <text class="small" x="34" y="334">Invalid-row detection and aggregate foundations exist today; live DLQ publishing and continuous metric writers are planned next.</text>
</svg>
