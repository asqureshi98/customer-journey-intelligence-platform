<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Realtime customer journey intelligence architecture</title>
  <desc id="desc">Local portfolio architecture showing generator, Redpanda, Spark, ClickHouse, API, and dashboard.</desc>
  <style>
    .bg { fill: #0f172a; }
    .box { fill: #111827; stroke: #38bdf8; stroke-width: 2; rx: 14; }
    .partial { stroke: #f59e0b; }
    .planned { stroke: #94a3b8; stroke-dasharray: 8 6; }
    .text { fill: #e5e7eb; font: 15px sans-serif; }
    .small { fill: #cbd5e1; font: 12px sans-serif; }
    .arrow { stroke: #67e8f9; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#67e8f9"/></marker></defs>
  <rect class="bg" width="980" height="420" rx="18"/>
