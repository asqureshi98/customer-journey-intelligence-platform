  <path class="arrow" d="M199 124 H244"/><path class="arrow" d="M399 124 H444"/><path class="arrow" d="M624 134 H674"/><path class="arrow" d="M759 188 V260"/><path class="arrow" d="M733 301 H790"/><path class="arrow" d="M674 172 C610 210 514 232 474 260"/><path class="arrow" d="M529 301 H588"/>
