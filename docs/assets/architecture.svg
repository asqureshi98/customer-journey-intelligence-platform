  <text class="text" x="274" y="112">Redpanda</text><text class="small" x="264" y="136">customer-events</text><text class="small" x="264" y="154">DLQ topic created</text>
  <rect class="box" x="444" y="80" width="180" height="108"/>
  <text class="text" x="468" y="112">Spark Streaming</text><text class="small" x="464" y="136">parse + validate split</text><text class="small" x="464" y="154">watermark + dedupe</text><text class="small" x="464" y="172">checkpointed sink</text>
  <rect class="box" x="674" y="80" width="170" height="108"/>
